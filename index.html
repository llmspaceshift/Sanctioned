<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dialer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --text: #f0f0f0;
    --muted: #666;
    --good: #00cc66;
    --danger: #ff4444;
    --warn: #ffaa00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen { display: none; width: 100%; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* PASTE SCREEN */
  #paste-screen { align-items: center; justify-content: center; padding: 2rem 1.5rem; gap: 1.75rem; }

  .wordmark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .instructions {
    width: 100%; max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem 1.25rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.7;
  }
  .instructions strong { color: var(--accent); }

  textarea {
    width: 100%; max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    padding: 1rem;
    resize: none;
    height: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }

  .error-msg {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--danger);
    display: none;
    max-width: 360px;
    width: 100%;
  }

  .btn-primary {
    width: 100%; max-width: 360px;
    background: var(--accent); color: #000;
    border: none; border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 1rem; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.85; }

  /* DIALER SCREEN */
  #dialer-screen { align-items: center; }

  .dialer-header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }

  .progress-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; color: var(--muted);
  }
  .progress-text span { color: var(--accent); font-weight: 600; }

  .progress-bar-wrap {
    flex: 1; margin: 0 1rem;
    height: 2px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }

  .btn-sm {
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.1em;
    padding: 0.35rem 0.6rem; cursor: pointer; text-transform: uppercase;
  }

  .contact-card {
    width: calc(100% - 3rem); max-width: 380px;
    margin: 2rem 0 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden; position: relative;
  }
  .contact-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent);
  }
  .contact-card-inner { padding: 1.75rem 1.5rem; }
  .contact-name { font-size: 1.4rem; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; line-height: 1.2; }
  .contact-job {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.25rem;
  }
  .contact-divider { height: 1px; background: var(--border); margin-bottom: 1.25rem; }
  .contact-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.5rem; font-weight: 600; color: var(--text); letter-spacing: 0.05em;
  }

  .call-btn {
    width: calc(100% - 3rem); max-width: 380px;
    background: var(--accent); color: #000;
    border: none; border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 1.25rem; cursor: pointer;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    transition: opacity 0.15s, transform 0.1s;
  }
  .call-btn:active { transform: scale(0.97); opacity: 0.85; }

  .outcome-section {
    display: none;
    width: calc(100% - 3rem); max-width: 380px;
    flex-direction: column; gap: 0.5rem;
    margin-top: 1.25rem;
  }
  .outcome-section.visible { display: flex; }

  .outcome-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase; text-align: center;
  }

  .outcome-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }

  .outcome-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.8rem 0.4rem; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    transition: all 0.15s;
  }
  .outcome-btn .icon { font-size: 1rem; }
  .outcome-btn:active { transform: scale(0.95); }
  .outcome-btn.sel-answered { border-color: var(--good); color: var(--good); background: rgba(0,204,102,0.08); }
  .outcome-btn.sel-no-answer { border-color: var(--danger); color: var(--danger); background: rgba(255,68,68,0.08); }
  .outcome-btn.sel-callback { border-color: var(--warn); color: var(--warn); background: rgba(255,170,0,0.08); }

  .next-btn {
    display: none;
    width: calc(100% - 3rem); max-width: 380px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    padding: 1.1rem; cursor: pointer;
    align-items: center; justify-content: center; gap: 0.5rem;
    margin-top: 0.75rem;
  }
  .next-btn.visible { display: flex; }
  .next-btn:active { opacity: 0.7; }

  /* LOG SCREEN */
  #log-screen { align-items: stretch; }

  .log-header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0.9rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0;
  }
  .log-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase;
  }

  .log-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border); border-bottom: 1px solid var(--border);
  }
  .stat-cell { background: var(--surface); padding: 1rem; text-align: center; }
  .stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 1.5rem; font-weight: 600; }
  .stat-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; font-family: 'IBM Plex Mono', monospace; }
  .s-answered .stat-num { color: var(--good); }
  .s-callback .stat-num { color: var(--warn); }
  .s-no-answer .stat-num { color: var(--danger); }

  .log-list { flex: 1; overflow-y: auto; }

  .log-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border); gap: 1rem;
  }
  .log-info { flex: 1; min-width: 0; }
  .log-name { font-size: 0.9rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-job { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; flex-shrink: 0; }
  .log-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 0.2rem 0.5rem; border-radius: 3px; border: 1px solid;
  }
  .log-badge.answered { color: var(--good); border-color: var(--good); }
  .log-badge.no-answer { color: var(--danger); border-color: var(--danger); }
  .log-badge.callback { color: var(--warn); border-color: var(--warn); }
  .log-badge.pending { color: var(--muted); border-color: var(--border); }
  .log-time { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--muted); }

  .log-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
  .btn-export {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.85rem; cursor: pointer;
  }

  /* DONE SCREEN */
  #done-screen { align-items: center; justify-content: center; padding: 2rem; gap: 1.5rem; text-align: center; }
  .done-icon { font-size: 3rem; }
  .done-title { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: 600; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
  .done-sub { color: var(--muted); font-size: 0.85rem; line-height: 1.7; font-family: 'IBM Plex Mono', monospace; white-space: pre-line; }
  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.75rem 1.5rem; cursor: pointer;
  }
</style>
</head>
<body>

<!-- PASTE SCREEN -->
<div id="paste-screen" class="screen active">
  <div class="wordmark">⬡ Dialer</div>
  <div class="instructions">
    Paste your list below. One contact per line:<br><br>
    <strong>Name, Job Type, Phone Number</strong><br><br>
    Example:<br>
    John Smith, Electrician, 5551234567<br>
    Maria Garcia, Plumber, 5559876543
  </div>
  <textarea id="paste-input" placeholder="John Smith, Electrician, 5551234567&#10;Maria Garcia, Plumber, 5559876543"></textarea>
  <div class="error-msg" id="error-msg">No valid contacts found. Check your format.</div>
  <button class="btn-primary" onclick="loadList()">Load List →</button>
</div>

<!-- DIALER SCREEN -->
<div id="dialer-screen" class="screen">
  <div class="dialer-header">
    <div class="progress-text"><span id="prog-current">1</span> / <span id="prog-total">0</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
    <button class="btn-sm" onclick="showLog()">Log</button>
  </div>

  <div class="contact-card">
    <div class="contact-card-inner">
      <div class="contact-name" id="contact-name">—</div>
      <div class="contact-job" id="contact-job">—</div>
      <div class="contact-divider"></div>
      <div class="contact-number" id="contact-number">—</div>
    </div>
  </div>

  <a class="call-btn" id="call-btn" href="#" onclick="onCallTapped()">
    <span>📞</span><span>Call</span>
  </a>

  <div class="outcome-section" id="outcome-section">
    <div class="outcome-label">Log outcome</div>
    <div class="outcome-row">
      <button class="outcome-btn" id="btn-answered" onclick="selectOutcome('answered')">
        <span class="icon">✅</span>Answered
      </button>
      <button class="outcome-btn" id="btn-no-answer" onclick="selectOutcome('no-answer')">
        <span class="icon">❌</span>No Answer
      </button>
      <button class="outcome-btn" id="btn-callback" onclick="selectOutcome('callback')">
        <span class="icon">🔁</span>Callback
      </button>
    </div>
  </div>

  <button class="next-btn" id="next-btn" onclick="advance()">Next →</button>
</div>

<!-- LOG SCREEN -->
<div id="log-screen" class="screen">
  <div class="log-header">
    <div class="log-title">Call Log</div>
    <button class="btn-sm" onclick="backToDialer()">← Back</button>
  </div>
  <div class="log-stats">
    <div class="stat-cell s-answered"><div class="stat-num" id="stat-answered">0</div><div class="stat-label">Answered</div></div>
    <div class="stat-cell s-callback"><div class="stat-num" id="stat-callback">0</div><div class="stat-label">Callback</div></div>
    <div class="stat-cell s-no-answer"><div class="stat-num" id="stat-no-answer">0</div><div class="stat-label">No Answer</div></div>
  </div>
  <div class="log-list" id="log-list"></div>
  <div class="log-footer">
    <button class="btn-export" onclick="exportCSV()">Export Log as CSV</button>
  </div>
</div>

<!-- DONE SCREEN -->
<div id="done-screen" class="screen">
  <div class="done-icon">🏁</div>
  <div class="done-title">List Complete</div>
  <div class="done-sub" id="done-summary"></div>
  <button class="btn-primary" onclick="exportCSV()" style="max-width:260px">Export Log</button>
  <button class="btn-ghost" onclick="resetAll()">Start New List</button>
</div>

<script>
  let contacts = [], currentIndex = 0, callLog = [], selectedOutcome = null;

  function loadList() {
    const raw = document.getElementById('paste-input').value.trim();
    if (!raw) { showError(); return; }
    const lines = raw.split(/\r?\n/).filter(l => l.trim());
    const parsed = [];
    for (const line of lines) {
      const parts = line.split(',').map(p => p.trim());
      if (parts.length < 3) continue;
      const number = parts[parts.length - 1].replace(/\D/g, '');
      if (number.length < 7) continue;
      // skip header
      if (!/^\d/.test(number) && number.length < 7) continue;
      const name = parts[0];
      const job = parts.slice(1, parts.length - 1).join(', ');
      parsed.push({ name, job, number });
    }
    if (parsed.length === 0) { showError(); return; }
    contacts = parsed; currentIndex = 0; callLog = [];
    showScreen('dialer-screen');
    renderContact();
  }

  function showError() {
    const el = document.getElementById('error-msg');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showLog() { renderLog(); showScreen('log-screen'); }
  function backToDialer() { showScreen('dialer-screen'); }
  function resetAll() {
    contacts = []; currentIndex = 0; callLog = [];
    document.getElementById('paste-input').value = '';
    showScreen('paste-screen');
  }

  function renderContact() {
    if (currentIndex >= contacts.length) { showDone(); return; }
    const c = contacts[currentIndex];
    document.getElementById('contact-name').textContent = c.name;
    document.getElementById('contact-job').textContent = c.job;
    document.getElementById('contact-number').textContent = formatNumber(c.number);
    document.getElementById('call-btn').href = 'tel:' + c.number;
    selectedOutcome = null;
    document.getElementById('outcome-section').classList.remove('visible');
    document.getElementById('next-btn').classList.remove('visible');
    ['answered','no-answer','callback'].forEach(o => {
      document.getElementById('btn-' + o).className = 'outcome-btn';
    });
    const total = contacts.length;
    document.getElementById('prog-current').textContent = currentIndex + 1;
    document.getElementById('prog-total').textContent = total;
    document.getElementById('progress-bar').style.width = (currentIndex / total * 100) + '%';
  }

  function onCallTapped() {
    setTimeout(() => {
      document.getElementById('outcome-section').classList.add('visible');
      document.getElementById('next-btn').classList.add('visible');
    }, 600);
  }

  function selectOutcome(outcome) {
    selectedOutcome = outcome;
    ['answered','no-answer','callback'].forEach(o => {
      document.getElementById('btn-' + o).className = 'outcome-btn';
    });
    document.getElementById('btn-' + outcome).className = 'outcome-btn sel-' + outcome;
  }

  function advance() {
    const c = contacts[currentIndex];
    callLog.push({ name: c.name, job: c.job, number: c.number, outcome: selectedOutcome || 'pending', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
    currentIndex++;
    renderContact();
  }

  function formatNumber(n) {
    if (n.length === 10) return `(${n.slice(0,3)}) ${n.slice(3,6)}-${n.slice(6)}`;
    if (n.length === 11 && n[0] === '1') return `+1 (${n.slice(1,4)}) ${n.slice(4,7)}-${n.slice(7)}`;
    return n;
  }

  function renderLog() {
    const stats = { answered: 0, 'no-answer': 0, callback: 0 };
    callLog.forEach(l => { if (stats[l.outcome] !== undefined) stats[l.outcome]++; });
    document.getElementById('stat-answered').textContent = stats.answered;
    document.getElementById('stat-no-answer').textContent = stats['no-answer'];
    document.getElementById('stat-callback').textContent = stats.callback;
    const list = document.getElementById('log-list');
    if (!callLog.length) { list.innerHTML = '<div style="padding:2rem;text-align:center;font-family:IBM Plex Mono,monospace;font-size:0.75rem;color:var(--muted)">No calls logged yet.</div>'; return; }
    list.innerHTML = callLog.slice().reverse().map(e => `
      <div class="log-item">
        <div class="log-info">
          <div class="log-name">${e.name}</div>
          <div class="log-job">${e.job}</div>
        </div>
        <div class="log-right">
          <span class="log-badge ${e.outcome}">${e.outcome}</span>
          <span class="log-time">${e.time}</span>
        </div>
      </div>`).join('');
  }

  function showDone() {
    const stats = { answered: 0, 'no-answer': 0, callback: 0 };
    callLog.forEach(l => { if (stats[l.outcome] !== undefined) stats[l.outcome]++; });
    document.getElementById('done-summary').textContent = `${callLog.length} calls completed\n${stats.answered} answered · ${stats['no-answer']} no answer · ${stats.callback} callback`;
    showScreen('done-screen');
  }

  function exportCSV() {
    const rows = [['Name','Job Type','Number','Outcome','Time']];
    callLog.forEach(l => rows.push([l.name, l.job, l.number, l.outcome, l.time]));
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `call-log-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }
</script>
</body>
</html>
